// ── helpers ──
const td=()=>new Date().toISOString().slice(0,10);
const fmt=d=>new Date(d+"T12:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const dleft=e=>Math.max(0,Math.ceil((new Date(e+"T23:59:59")-new Date())/86400000));
const dsince=s=>Math.max(0,Math.floor((new Date()-new Date(s+"T00:00:00"))/86400000));
const uid=()=>Math.random().toString(36).slice(2,9);
const gcs=ss=>{const t=td();return ss.find(s=>s.start<=t&&s.end>t)||ss[0];};
const gsp=s=>Math.min(100,Math.round(dsince(s.start)/Math.max(1,Math.ceil((new Date(s.end)-new Date(s.start))/86400000))*100));
const gcat=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];
const gst=id=>STYPES.find(t=>t.id===id)||STYPES[STYPES.length-1];
const glv=xp=>{let l=LEVELS[0];for(const x of LEVELS){if(xp>=x.xpNeeded)l=x;}return l;};
const gnl=xp=>LEVELS.find(l=>l.xpNeeded>xp)||LEVELS[LEVELS.length-1];
const glp=xp=>{const c=glv(xp),n=gnl(xp);if(c.level===n.level)return 100;return Math.round((xp-c.xpNeeded)/(n.xpNeeded-c.xpNeeded)*100);};

function useStore(key,init){
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const set=useCallback(fn=>{sv(prev=>{const next=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem(key,JSON.stringify(next));}catch{}return next;});},[key]);
  return[v,set];
}

// ── DAILY CHECKLIST (today view) ──
function DailyTab({seasons,setSeasons,xp,onXP}){
  const season=gcs(seasons);
  const meta=season?gst(season.type):STYPES[0];
  const isOffshore=season&&season.type==="on";
  const goals=season?season.goals||[]:[];
  
  // Separate daily rhythm goals from season goals
  const dailyIds=isOffshore?OFFSHORE_DAILY.map(g=>g.id):HOME_DAILY.map(g=>g.id);
  const dailyGoals=goals.filter(g=>dailyIds.includes(g.id));
  const seasonGoals=goals.filter(g=>!dailyIds.includes(g.id));
  
  const todayKey=td();
  const ciDone=localStorage.getItem("ci_"+todayKey);
  
  // Daily goal completion for today
  const getDailyDone=gid=>!!localStorage.getItem(`dg_${gid}_${todayKey}`);
  const setDailyDone=(gid)=>{
    localStorage.setItem(`dg_${gid}_${todayKey}`,"1");
    onXP(XPR.checkin,"Daily practice logged! +15 XP");
  };

  const togT=(gid,tid)=>setSeasons(ss=>ss.map(s=>{
    if(s.id!==season?.id)return s;

// ── AI PLAN TAB — with ability to add/edit goals ──
function PlanTab({season,seasons,setSeasons,goals,onXP}){
  const[msgs,setMsgs]=useState([{role:"assistant",text:"Palmer OS Intelligence active.\n\nI know your full rotation schedule, every season, and all your goals. I can also CREATE and EDIT goals directly from here.\n\nTry: 'Add a goal to Shore Leave II for the copywriting course' or 'What should I focus on this season?'"}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollIntoView({behavior:"smooth"});},[msgs]);

  // Tool to add a goal to a season
  const addGoalToSeason=(seasonName,goalData)=>{
    const s=seasons.find(s=>s.name.toLowerCase().includes(seasonName.toLowerCase()));
    if(!s)return"Season not found: "+seasonName;
    const newGoal={id:uid(),title:goalData.title||"New Goal",category:goalData.category||"goals",priority:goalData.priority||"medium",status:"pending",notes:goalData.notes||"",tasks:(goalData.tasks||[]).map(t=>({id:uid(),text:t,done:false}))};
    setSeasons(ss=>ss.map(sx=>sx.id===s.id?{...sx,goals:[...sx.goals,newGoal]}:sx));
    onXP(10,"Goal added to "+s.name+"!");
    return"Added '"+newGoal.title+"' to "+s.name;
  };

  const send=async()=>{
    const q=input.trim();if(!q||loading)return;
    setInput("");setMsgs(m=>[...m,{role:"user",text:q}]);setLoading(true);

    const seasonsContext=seasons.map(s=>{
      const gs=s.goals||[];
      return s.name+" ("+s.type+", "+s.start+" to "+s.end+"): "+gs.length+" goals ["+gs.map(g=>g.title+"("+g.category+","+g.priority+")").join("; ")+"]";
    }).join("\n");

    const sys=`You are the planning intelligence for Garry Palmer's Palmer OS life dashboard. You can both advise AND create goals directly in the app.

GARRY'S CONTEXT:
- Chief Mate Unlimited, DPO Unlimited, offshore DP supply vessels, Edison Chouest Offshore, Guyana, 28/28 rotation
- LMA Diploma in Ship Management enrolled (May 2026)
- Target roles: Marine Superintendent, DPA, Internal Auditor

THREE PILLARS:
1. INNER CURRICULUM: AMORC rejoined (going all the way), brahmacharya 90 days, ayahuasca ceremony, father reckoning, vision quest, real teacher, the two letters (to/from 60yr self), naming the thing he fears to want
2. MONTHLY GOALS: consultancy setup, podcast, LinkedIn branding, iTalki language (Mandarin/Spanish), ISM auditor, reading stack, video editing, copywriting
3. THE BOOK: Ravenborn Chronicles - fantasy novel, story bible complete, prose not started. 1x session offshore, 3x sessions home.

ROTATION SEASONS:
${seasonsContext}

CURRENT SEASON: ${season?season.name+" ("+season.type+", "+season.start+" to "+season.end+")":"none"}

CAPABILITY: You can create goals. When the user asks you to add or create a goal, respond with a JSON block in this exact format at the END of your response:

ACTION:ADD_GOAL
{
  "season": "Shore Leave II",
  "goal": {
    "title": "Goal title here",
    "category": "inner|goals|book|career|health|spirit|daily|creative|custom",
    "priority": "critical|high|medium|low",
    "notes": "Brief description",
    "tasks": ["Task 1", "Task 2", "Task 3"]
  }
}

Only include the ACTION block when creating a goal. Otherwise just advise. Be direct, specific, grounded. No generic advice. Concise for mobile.`;

    try{
      const history=msgs.slice(-6).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[...history,{role:"user",content:q}]})});
      const data=await res.json();
      const text=data.content&&data.content[0]?data.content[0].text:"Try again.";
      
      // Check for ACTION block
      if(text.includes("ACTION:ADD_GOAL")){
        try{
          const jsonStart=text.indexOf("{",text.indexOf("ACTION:ADD_GOAL"));
          const jsonEnd=text.lastIndexOf("}")+1;
          const parsed=JSON.parse(text.slice(jsonStart,jsonEnd));
          const result=addGoalToSeason(parsed.season,parsed.goal);
          const cleanText=text.slice(0,text.indexOf("ACTION:ADD_GOAL")).trim();
          setMsgs(m=>[...m,{role:"assistant",text:cleanText+"\n\n✅ "+result}]);
        }catch(e){
          setMsgs(m=>[...m,{role:"assistant",text:text}]);
        }
      }else{
        setMsgs(m=>[...m,{role:"assistant",text:text}]);
      }
    }catch(e){setMsgs(m=>[...m,{role:"assistant",text:"Connection issue. Check internet."}]);}
    setLoading(false);
  };

  const suggs=["Add a goal to Shore Leave I for the consultancy","What should I focus on Deep Water I?","Plan Shore Leave II week by week","Add a writing milestone to Shore Leave III"];

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"calc(100vh - 220px)"}},
    React.createElement("div",{style:{flex:1,overflowY:"auto",paddingBottom:8}},
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{marginBottom:10,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
        React.createElement("div",{style:{maxWidth:"87%",padding:"10px 13px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.role==="user"?C.gold:C.card2,color:m.role==="user"?C.navy:C.white,fontSize:12,lineHeight:1.65,border:m.role==="assistant"?`1px solid ${C.borderFaint}`:"none",whiteSpace:"pre-wrap"}},m.text))),
      loading&&React.createElement("div",{style:{display:"flex",gap:4,padding:"12px 13px",background:C.card2,borderRadius:"16px 16px 16px 4px",width:60,border:`1px solid ${C.borderFaint}`}},
        [0,1,2].map(i=>React.createElement("div",{key:i,style:{width:6,height:6,borderRadius:"50%",background:C.gold,animation:`pulse 1.2s ${i*0.2}s infinite`}}))),
      React.createElement("div",{ref:ref})),
    msgs.length===1&&React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}},
      suggs.map((s,i)=>React.createElement("div",{key:i,onClick:()=>setInput(s),style:{padding:"5px 10px",borderRadius:14,border:`1px solid ${C.border}`,background:C.whiteFaint,color:C.whiteDim,fontSize:10,cursor:"pointer",fontFamily:"monospace"}},s))),
    React.createElement("div",{style:{display:"flex",gap:8}},
      React.createElement("input",{style:{...inp,flex:1},value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&send(),placeholder:"Ask or say 'Add a goal to...'"}),
      React.createElement("button",{style:{...st("gold"),padding:"10px 14px"},onClick:send,disabled:loading},"→")));
}
