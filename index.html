// helpers
const td=()=>new Date().toISOString().slice(0,10);
const fmt=d=>new Date(d+"T12:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const fmtShort=d=>new Date(d+"T12:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
const dleft=e=>Math.max(0,Math.ceil((new Date(e+"T23:59:59")-new Date())/86400000));
const dsince=s=>Math.max(0,Math.floor((new Date()-new Date(s+"T00:00:00"))/86400000));
const uid=()=>Math.random().toString(36).slice(2,9);
const gcs=ss=>{const t=td();return ss.find(s=>s.start<=t&&s.end>t)||ss[0];};
const gsp=s=>Math.min(100,Math.round(dsince(s.start)/Math.max(1,Math.ceil((new Date(s.end)-new Date(s.start))/86400000))*100));
const gcat=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];
const gst=id=>STYPES.find(t=>t.id===id)||STYPES[STYPES.length-1];
const glv=xp=>{let l=LEVELS[0];for(const x of LEVELS){if(xp>=x.xpNeeded)l=x;}return l;};
const gnl=xp=>LEVELS.find(l=>l.xpNeeded>xp)||LEVELS[LEVELS.length-1];
const glp=xp=>{const c=glv(xp),n=gnl(xp);if(c.level===n.level)return 100;return Math.round((xp-c.xpNeeded)/(n.xpNeeded-c.xpNeeded)*100);};
const getDailyQuote=()=>DAILY_QUOTES[Math.floor(new Date().getDate()%DAILY_QUOTES.length)];

function useStore(key,init){
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const set=useCallback(fn=>{sv(prev=>{const next=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem(key,JSON.stringify(next));}catch{}return next;});},[key]);
  return[v,set];
}

function PlanTab({season,seasons,setSeasons,goals,onXP}){
  const[msgs,setMsgs]=useState([{role:"assistant",text:"Palmer OS Intelligence active.\n\nI know your full plan, every season, all your goals. I can also CREATE goals directly.\n\nTry: 'Add a goal to Shore Leave II for the copywriting course' or 'What should I focus on this season?'"}]);
  const[input,setInput]=useState("");const[loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollIntoView({behavior:"smooth"});},[msgs]);
  const addGoal=(seasonName,goalData)=>{
    const s=seasons.find(s=>s.name.toLowerCase().includes(seasonName.toLowerCase()));
    if(!s)return"Season not found: "+seasonName;
    const ng={id:uid(),title:goalData.title||"New Goal",category:goalData.category||"goals",priority:goalData.priority||"medium",status:"pending",notes:goalData.notes||"",tasks:(goalData.tasks||[]).map(t=>({id:uid(),text:t,done:false}))};
    setSeasons(ss=>ss.map(sx=>sx.id===s.id?{...sx,goals:[...sx.goals,ng]}:sx));
    onXP(10,"Goal added to "+s.name+"!");
    return"Added '"+ng.title+"' to "+s.name;
  };
  const send=async()=>{
    const q=input.trim();if(!q||loading)return;
    setInput("");setMsgs(m=>[...m,{role:"user",text:q}]);setLoading(true);
    const sc=seasons.map(s=>s.name+" ("+s.type+","+s.start+"→"+s.end+"): "+s.goals.map(g=>g.title).join("; ")).join("\n");
    const sys="You are the planning intelligence for Garry Palmer's Palmer OS.\n\nGarry: Chief Mate Unlimited, DPO Unlimited, offshore DP supply vessels, Edison Chouest Offshore, Guyana, 28/28 rotation. LMA Diploma in Ship Management. Target: Marine Superintendent, DPA, Internal Auditor.\n\nTHREE PILLARS:\n1. INNER: AMORC (rejoining), brahmacharya 90d, ayahuasca, father reckoning, vision quest, real teacher, two letters, naming the thing he fears to want\n2. GOALS: consultancy, podcast, LinkedIn, iTalki language, ISM auditor, reading stack, video editing, copywriting\n3. BOOK: Ravenborn Chronicles, story bible complete, prose not started. 1x offshore, 3x home.\n\nSEASONS:\n"+sc+"\n\nCURRENT: "+(season?season.name+" ("+season.type+")":"none")+"\n\nYou can create goals. When user asks to add/create a goal, include at the END of your response:\n\nACTION:ADD_GOAL\n{\"season\":\"Shore Leave II\",\"goal\":{\"title\":\"Goal title\",\"category\":\"inner|goals|book|career|health|spirit|daily|creative|custom\",\"priority\":\"critical|high|medium|low\",\"notes\":\"Brief description\",\"tasks\":[\"Task 1\",\"Task 2\"]}}\n\nBe direct, specific, grounded. No generic advice. Concise for mobile.";
    try{
      const history=msgs.slice(-6).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[...history,{role:"user",content:q}]})});
      const data=await res.json();
      const text=data.content&&data.content[0]?data.content[0].text:"Try again.";
      if(text.includes("ACTION:ADD_GOAL")){
        try{
          const js=text.indexOf("{",text.indexOf("ACTION:ADD_GOAL"));
          const je=text.lastIndexOf("}")+1;
          const p=JSON.parse(text.slice(js,je));
          const result=addGoal(p.season,p.goal);
          setMsgs(m=>[...m,{role:"assistant",text:text.slice(0,text.indexOf("ACTION:ADD_GOAL")).trim()+"\n\n✅ "+result}]);
        }catch{setMsgs(m=>[...m,{role:"assistant",text}]);}
      }else{setMsgs(m=>[...m,{role:"assistant",text}]);}
    }catch{setMsgs(m=>[...m,{role:"assistant",text:"Connection issue."}]);}
    setLoading(false);
  };
  const suggs=["What should I focus on this season?","Add a goal for the copywriting course to Shore Leave IV","Plan Shore Leave I week by week","How do I balance the book offshore?"];
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"calc(100vh - 220px)"}},
    React.createElement("div",{style:{flex:1,overflowY:"auto",paddingBottom:8}},
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{marginBottom:10,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
        React.createElement("div",{style:{maxWidth:"87%",padding:"10px 13px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.role==="user"?C.gold:C.card2,color:m.role==="user"?C.navy:C.white,fontSize:12,lineHeight:1.65,border:m.role==="assistant"?`1px solid ${C.borderFaint}`:"none",whiteSpace:"pre-wrap"}},m.text))),
      loading&&React.createElement("div",{style:{display:"flex",gap:4,padding:"12px 13px",background:C.card2,borderRadius:"16px 16px 16px 4px",width:60,border:`1px solid ${C.borderFaint}`}},
        [0,1,2].map(i=>React.createElement("div",{key:i,style:{width:6,height:6,borderRadius:"50%",background:C.gold,animation:`pulse 1.2s ${i*0.2}s infinite`}}))),
      React.createElement("div",{ref})),
    msgs.length===1&&React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}},suggs.map((s,i)=>React.createElement("div",{key:i,onClick:()=>setInput(s),style:{padding:"5px 10px",borderRadius:14,border:`1px solid ${C.border}`,background:C.whiteFaint,color:C.whiteDim,fontSize:10,cursor:"pointer",fontFamily:"monospace"}},s))),
    React.createElement("div",{style:{display:"flex",gap:8}},
      React.createElement("input",{style:{...inp,flex:1},value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&send(),placeholder:"Ask or say 'Add a goal to...'"}),
      React.createElement("button",{style:{...st("gold"),padding:"10px 14px"},onClick:send,disabled:loading},"→")));
}
